  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #007bff, #00c6ff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .profile img {
      width: 120px;
      height: 120px;
      object-fit: contain; /* ini kunci supaya gak terpotong */
      background: white;
      padding: 8px;
      border-radius: 15px; /* ubah dari bulat jadi soft kotak */
      border: 3px solid #007bff;
    }

    .profile h2 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .profile p {
      font-size: 13px;
      color: gray;
      margin-bottom: 20px;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-size: 14px;
      font-weight: 500;
      transition: 0.3s;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    .links a:hover {
      transform: translateY(-3px);
      opacity: 0.9;
    }

    /* Warna beda tiap tombol */
    .instagram { background: #E1306C; }
    .youtube { background: #FF0000; }
    .tiktok { background: #000000; }
    .facebook { background: #1877F2; }
    .whatsapp { background: #25D366; }
    .maps { background: #34A853; }
    .email { background: #6c757d; }
    .phone { background: #17a2b8; }

    footer {
      margin-top: 15px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

      </a>

      <a href="http://wa.me/6281373225424" target="_blank" class="whatsapp">

      </a>

      <a href="https://maps.app.goo.gl/TULgjHbcUggV9RMD7" target="_blank" class="maps">
        <i class="fas fa-map-marker-alt"></i> Lokasi

      <a href="mailto:uptdlabkes@sumutprov.go.id" class="email">
